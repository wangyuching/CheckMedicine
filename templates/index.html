<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>CheckPills</title>
    <style>
        body {
            background-color: rgb(247, 240, 240);
            margin: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
        }

        .content {
            margin-left: 60px;
            width: calc(100vw - 80px);
            height: 100vh;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
        }

        .log-container {
            width: 20%;
            height: 85%;
            background-color: rgb(233, 245, 254);
            color: rgb(8, 24, 94);
            padding: 20px;
            overflow-y: auto;
            border-radius: 8px;
        }

        .video-container {
            width: 70%;
            height: 85%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            overflow: hidden;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="log-container">
            <div class="log" id="log-content">載入中...請稍候...</div>
        </div>

        <div class="video-container">
            <img src="{{ url_for('cap_in_html') }}" alt="Video Stream">
        </div>
