<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧藥盒 AI 監控系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 核心重設：嚴格鎖定 100vh 且不出現滾動條 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F0F4F8; /* 乾淨輕盈的淡藍灰背景 */
            overflow: hidden; /* 嚴格禁止任何滾動條 */
            font-family: 'Noto Sans TC', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 外部大容器，鎖定網頁常用高解析度，確保元件不跑位 */
        .system-container {
            width: 100vw;
            height: 100vh;
            max-width: 1440px;
            max-height: 900px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 頂部標題列 */
        .system-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #D1D5DB;
            padding-bottom: 12px;
        }

        .system-title {
            font-size: 28px;
            font-weight: 700;
            color: #1E3A8A; /* 醫療深藍色 */
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .system-title i {
            color: #2563EB; /* 明亮藍色 */
        }

        .realtime-clock {
            font-family: 'JetBrains Mono', monospace;
            color: #4B5563;
            font-size: 18px;
            font-weight: 500;
        }

        /* 主內容區域佈局：左側（提示+影像）、右側（檢查框） */
        .content-layout {
            display: flex;
            flex-direction: row;
            gap: 24px;
            flex: 1; /* 自動填滿剩下高度 */
            min-height: 0; /* 關鍵：防止內容撐開導致滾動條 */
        }

        /* 左側大區塊：分為上下兩層 */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 2; /* 佔據 2/3 寬度 */
            min-height: 0;
        }

        /* 右側大區塊：一整列 */
        .right-column {
            flex: 1; /* 佔據 1/3 寬度 */
            min-height: 0;
        }

        /* 通用卡片外觀 */
        .zone-card {
            background-color: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
        }

        .zone-title {
            font-size: 18px;
            font-weight: 700;
            color: #4B5563;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #F3F4F6;
            padding-bottom: 8px;
        }

        /* 1. 提示區 (左上) */
        .prompt-zone {
            flex-shrink: 0; /* 高度固定，不被壓縮 */
            height: 120px;
            justify-content: center;
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%); /* 舒適的淡藍漸層 */
            border: 2px solid #BFDBFE;
            position: relative;
        }

        .alert-text {
            font-size: 32px;
            font-weight: 700;
            color: #1E40AF; /* 預設深藍字 */
            text-align: center;
            transition: color 0.3s ease;
        }

        /* 當有重要警示時（例如：要吃藥、還沒到時間），透過 JS 動態套用此樣式 */
        .alert-urgent {
            color: #DC2626 !important; /* 警告紅 */
        }

        /* 2. 攝影畫面 (左下) */
        .camera-zone {
            flex: 1; /* 自動填滿左側下方所有空間 */
            background-color: #F3F4F6;
            position: relative;
            min-height: 0;
        }

        .video-wrapper {
            width: 100%;
            height: calc(100% - 35px); /* 扣除標題高度 */
            background-color: #000000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保持攝影機 4:3 或 16:9 原比例，不拉伸 */
        }

        /* 3. 三餐檢查框 (右側) */
        .check-meals-zone {
            height: 100%; /* 撐滿右側 */
            background-color: #FFFFFF;
        }

        .meal-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
            justify-content: flex-start;
        }

        /* 每一餐的卡片項目 */
        .meal-item {
            background-color: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* 當前時段高亮效果 */
        .meal-item.current-active {
            border-color: #3B82F6;
            background-color: #F0F6FF;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .meal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meal-name {
            font-size: 18px;
            font-weight: 700;
            color: #1F2937;
        }

        .meal-status-icon {
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .meal-time {
            font-size: 13px;
            color: #6B7280;
            font-family: 'JetBrains Mono', monospace;
        }

        /* 狀態標籤 */
        .status-tag {
            font-size: 12px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            width: fit-content;
        }
        .tag-pending { background-color: #E5E7EB; color: #4B5563; }
        .tag-checked { background-color: #D1FAE5; color: #065F46; }
        .tag-missed  { background-color: #FEE2E2; color: #991B1B; }

        /* 右側底部系統小資訊 */
        .system-info-footer {
            margin-top: auto; /* 推到最底部 */
            padding-top: 16px;
            border-top: 1px solid #E5E7EB;
            font-size: 13px;
            color: #6B7280;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="system-container">
    <div class="system-header">
        <div class="system-title">
            <i class="fa-solid fa-laptop-medical"></i> 智慧藥盒 AI 監控系統
        </div>
        <div class="realtime-clock" id="live-clock">0000-00-00 00:00:00</div>
    </div>

    <div class="content-layout">
        
        <div class="left-column">
            <div class="zone-card prompt-zone">
                <div class="zone-title"><i class="fa-solid fa-bell"></i> 系統即時提示</div>
                <div class="alert-text" id="alert-msg">網頁連線中...</div>
            </div>

            <div class="zone-card camera-zone">
                <div class="zone-title"><i class="fa-solid fa-video"></i> 即時影像串流 (AI 辨識)</div>
                <div class="video-wrapper">
                    <img class="camera-feed" src="{{ url_for('cap_in_html') }}" alt="Camera Stream Video">
                </div>
            </div>
        </div>

        <div class="right-column">
            <div class="zone-card check-meals-zone">
                <div class="zone-title"><i class="fa-solid fa-calendar-check"></i> 今日服藥檢查狀態</div>
                
                <div class="meal-list">
                    <div class="meal-item" id="meal-breakfast">
                        <div class="meal-header">
                            <span class="meal-name">🌅 早餐 (07:00 - 08:00)</span>
                            <span class="meal-status-icon" id="icon-breakfast"><i class="fa-solid fa-circle-minus" style="color:#9CA3AF;"></i></span>
                        </div>
                        <span class="status-tag tag-pending" id="tag-breakfast">準備中</span>
                        <span class="meal-time" id="time-breakfast">服藥時間：--:--:--</span>
                    </div>

                    <div class="meal-item" id="meal-lunch">
                        <div class="meal-header">
                            <span class="meal-name">☀️ 午餐 (12:00 - 13:00)</span>
                            <span class="meal-status-icon" id="icon-lunch"><i class="fa-solid fa-circle-minus" style="color:#9CA3AF;"></i></span>
                        </div>
                        <span class="status-tag tag-pending" id="tag-lunch">準備中</span>
                        <span class="meal-time" id="time-lunch">服藥時間：--:--:--</span>
                    </div>

                    <div class="meal-item" id="meal-dinner">
                        <div class="meal-header">
                            <span class="meal-name">🌌 晚餐 (17:00 - 18:00)</span>
                            <span class="meal-status-icon" id="icon-dinner"><i class="fa-solid fa-circle-minus" style="color:#9CA3AF;"></i></span>
                        </div>
                        <span class="status-tag tag-pending" id="tag-dinner">準備中</span>
                        <span class="meal-time" id="time-dinner">服藥時間：--:--:--</span>
                    </div>

                    <div class="system-info-footer">
                        <div><i class="fa-solid fa-microchip"></i> 核心模組：YOLOv8 OBB</div>
                        <div><i class="fa-solid fa-database"></i> 狀態資料庫：SQLAlchemy 同步</div>
                        <div style="margin-top: 4px; color: #2563EB; font-weight: 500;">
                            提示：請將藥盒置於攝影機視角內。
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // 網頁即時時鐘
    function updateClock() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('live-clock').innerText = `${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
    }
    setInterval(updateClock, 1000);

    // 向後端 API 請求最新提示與三餐吃藥狀態
    function fetchSystemStatus() {
        fetch('/api/status')
            .then(response => response.json())
            .then(data => {
                // 1. 更新提示文字區
                const alertMsg = document.getElementById('alert-msg');
                if (data.alert_message) {
                    alertMsg.innerText = data.alert_message;
                    
                    // 判斷是否為需要高亮變紅的緊急提示字樣
                    if (data.alert_message.includes('要吃') || data.alert_message.includes('還沒到')) {
                        alertMsg.classList.add('alert-urgent');
                    } else {
                        alertMsg.classList.remove('alert-urgent');
                    }
                } else {
                    alertMsg.innerText = "目前非服藥時段或今日已完成服藥";
                    alertMsg.classList.remove('alert-urgent');
                }

                // 2. 輪詢更新 早餐、午餐、晚餐 卡片狀態
                const meals = ['breakfast', 'lunch', 'dinner'];
                
                // 順便獲取當前小時來判斷哪一餐是「當前時段」，給予外框高亮
                const currentHour = new Date().getHours();

                meals.forEach(meal => {
                    const itemCard = document.getElementById(`meal-${meal}`);
                    const iconSpan = document.getElementById(`icon-${meal}`);
                    const tagSpan = document.getElementById(`tag-${meal}`);
                    const timeSpan = document.getElementById(`time-${meal}`);

                    // 先重置外框高亮
                    itemCard.classList.remove('current-active');
                    
                    // 動態標註當前時段的外框 (早: 7點, 午: 12點, 晚: 17點)
                    if (meal === 'breakfast' && currentHour === 7) itemCard.classList.add('current-active');
                    if (meal === 'lunch' && currentHour === 12) itemCard.classList.add('current-active');
                    if (meal === 'dinner' && currentHour === 17) itemCard.classList.add('current-active');

                    // 依據後端資料庫狀態更新 UI
                    if (data[meal].status === 'Checked') {
                        // 已吃藥：打勾綠色
                        iconSpan.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#10B981;"></i>';
                        tagSpan.className = 'status-tag tag-checked';
                        tagSpan.innerText = '已服藥';
                        timeSpan.innerText = `服藥時間：${data[meal].time}`;
                    } else if (data[meal].status === 'Missed') {
                        // 未吃藥：打叉紅色
                        iconSpan.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:#EF4444;"></i>';
                        tagSpan.className = 'status-tag tag-missed';
                        tagSpan.innerText = '未服藥';
                        timeSpan.innerText = '未在指定時間內服藥';
                    } else {
                        // 等待中：灰色
                        iconSpan.innerHTML = '<i class="fa-solid fa-circle-minus" style="color:#9CA3AF;"></i>';
                        tagSpan.className = 'status-tag tag-pending';
                        tagSpan.innerText = '準備中';
                        timeSpan.innerText = '服藥時間：--:--:--';
                    }
                });
            })
            .catch(err => {
                console.error("無法取得 API 狀態:", err);
                document.getElementById('alert-msg').innerText = "系統連線中斷...";
            });
    }

    // 每 1 秒輪詢一次最新狀態
    setInterval(fetchSystemStatus, 1000);
    window.onload = function() {
        updateClock();
        fetchSystemStatus();
    };
</script>

</body>
</html>
